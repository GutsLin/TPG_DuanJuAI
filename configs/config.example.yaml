app:
  name: "Huobao Drama API"
  version: "1.0.0"
  debug: true
  language: "zh" # 系统语言：zh(中文) 或 en(英文)

server:
  port: 5678
  host: "0.0.0.0"
  cors_origins:
    - "http://localhost:3012"
  read_timeout: 600
  write_timeout: 600

database:
  type: "postgresql"
  url: "postgres://huobao:huobao@localhost:5432/huobao_drama"
  pool_size: 20

queue:
  type: "bullmq"
  redis_url: "redis://localhost:6379"
  image_concurrency: 4
  video_concurrency: 2
  media_concurrency: 2

storage:
  type: "local"
  local_path: "./data/storage"
  base_url: "http://localhost:5678/static"

ai:
  default_text_provider: "openai"
  default_image_provider: "openai"
  default_video_provider: "doubao"
