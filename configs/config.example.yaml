# ⚠️ 注意：本文件仅供参考，不会被后端代码加载。
# 运行时配置全部通过环境变量注入（见 backend/.env.example）。
# 本地开发：cp backend/.env.example backend/.env（启动脚本会自动加载）。
# Docker 部署：通过 docker-compose.yml 的 environment 或宿主机环境变量注入。

app:
  name: "Huobao Drama API"
  version: "1.0.0"
  debug: true
  language: "zh" # 系统语言：zh(中文) 或 en(英文)

server:
  port: 5679
  host: "0.0.0.0"
  cors_origins:
    - "http://localhost:3013"
  read_timeout: 600
  write_timeout: 600

database:
  type: "postgresql"
  url: "postgres://huobao:huobao@localhost:5432/huobao_drama"
  pool_size: 20

queue:
  type: "bullmq"
  redis_url: "redis://localhost:6379"
  image_concurrency: 4
  video_concurrency: 2
  media_concurrency: 2

storage:
  type: "local"
  local_path: "./data/static"
  base_url: "http://localhost:5679/static"

ai:
  default_text_provider: "openai"
  default_image_provider: "openai"
  default_video_provider: "doubao"
